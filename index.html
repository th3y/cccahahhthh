<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Chat</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui,Segoe UI,Roboto,Arial;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN */

#login{
width:100%;
max-width:400px;
padding:40px;
background:#1e293b;
border-radius:14px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
text-align:center;
}

#login h2{
margin-bottom:20px;
}

#login input{
width:100%;
padding:14px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
margin-bottom:12px;
font-size:15px;
}

#login button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* CHAT */

#chat{
display:none;
flex-direction:column;
height:100vh;
width:100%;
max-width:750px;
background:#020617;
}

/* HEADER */

#header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 16px;
border-bottom:1px solid #1e293b;
}

#header span{
font-size:14px;
opacity:0.8;
}

#deleteBtn{
background:#ef4444;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

/* MESSAGES */

#messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
padding:10px 14px;
border-radius:10px;
max-width:70%;
font-size:15px;
display:flex;
flex-direction:column;
}

.me{
background:#2563eb;
align-self:flex-end;
}

.other{
background:#1e293b;
align-self:flex-start;
}

.author{
font-size:12px;
opacity:0.7;
margin-bottom:2px;
}

.timestamp{
font-size:11px;
opacity:0.5;
margin-top:4px;
}

/* INPUT */

#inputArea{
display:flex;
padding:12px;
border-top:1px solid #1e293b;
}

#msg{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
}

#sendBtn{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* MOBILE */

@media (max-width:600px){

.message{
max-width:85%;
}

#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
}

}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">

<h2>Private Chat</h2>

<input id="nick" placeholder="Nickname">

<input id="room" placeholder="Room Password">

<button onclick="join()">Enter</button>

</div>

<!-- CHAT -->

<div id="chat">

<div id="header">

<span>Private conversation</span>

<button id="deleteBtn" onclick="deleteChat()">Delete</button>

</div>

<div id="messages"></div>

<div id="inputArea">

<input id="msg" placeholder="Type message">

<button id="sendBtn" onclick="send()">Send</button>

</div>

</div>

<!-- SOCKET -->

<script src="https://cccahahhthh.onrender.com/socket.io/socket.io.js"></script>

<script>

const socket = io("https://cccahahhthh.onrender.com")

let room=""
let nick=""

/* JOIN */

function join(){

room=document.getElementById("room").value.trim()
nick=document.getElementById("nick").value.trim()

if(!room || !nick) return

socket.emit("join-room",room)

document.getElementById("login").style.display="none"
document.getElementById("chat").style.display="flex"

}

/* SEND MESSAGE */

function send(){

const input=document.getElementById("msg")
const text=input.value.trim()

if(!text) return

const time=new Date().toISOString()

socket.emit("message",{
room:room,
text:text,
time:time,
nick:nick
})

input.value=""

}

/* RECEIVE MESSAGE */

socket.on("message",(data)=>{

const isMe = data.nick === nick

addMessage(data.text,data.time,isMe,data.nick)

})

/* ADD MESSAGE */

function addMessage(text,time,me,author){

const container=document.createElement("div")

container.classList.add("message")
container.classList.add(me ? "me":"other")

const name=document.createElement("div")
name.classList.add("author")
name.textContent=author

const message=document.createElement("div")
message.textContent=text

const timestamp=document.createElement("div")
timestamp.classList.add("timestamp")
timestamp.textContent=formatTime(time)

container.appendChild(name)
container.appendChild(message)
container.appendChild(timestamp)

document.getElementById("messages").appendChild(container)

document.getElementById("messages").scrollTop=
document.getElementById("messages").scrollHeight

}

/* FORMAT TIME */

function formatTime(iso){

const date=new Date(iso)

return date.toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
})

}

/* DELETE CHAT */

function deleteChat(){

const code=prompt("Delete code")

if(code==="DELETE123"){

socket.emit("delete-chat",{room:room})

}

}

/* CLEAR CHAT */

socket.on("clear",()=>{

document.getElementById("messages").innerHTML=""

})

</script>

</body>
</html>
