<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atun - Datos curiosos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,Segoe UI,Roboto;}
body{background:#0b0f19;color:white;height:100dvh;display:flex;justify-content:center;align-items:center;}
#login{width:100%;max-width:420px;background:#121826;padding:40px;border-radius:14px;box-shadow:0 15px 40px rgba(0,0,0,0.4);}
#login h2{text-align:center;margin-bottom:20px;}
#login input{width:100%;padding:14px;margin-bottom:12px;border:none;border-radius:8px;background:#0b0f19;color:white;transition:0.2s;}
#login input:focus{outline:none;box-shadow:0 0 8px #2563eb;}
#login button{width:100%;padding:14px;border:none;border-radius:8px;background:#2563eb;color:white;cursor:pointer;transition:0.2s;}
#login button:hover{background:#1e40af;}

#chat{display:none;flex-direction:column;width:100%;max-width:750px;height:100dvh;}

#header{flex-shrink:0;padding:12px 16px;border-bottom:1px solid #1f2937;display:flex;justify-content:space-between;align-items:center;transition:0.3s;}
#header b{font-size:18px;}
#roomHash{font-size:12px;opacity:0.6;}
#status{font-size:11px;opacity:0.7;margin-top:2px;transition:0.3s;}
#deleteBtn{background:#ef4444;border:none;color:white;padding:6px 10px;border-radius:6px;cursor:pointer;transition:0.2s;}
#deleteBtn:hover{background:#b91c1c;}

#messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
.message{padding:10px 14px;border-radius:12px;max-width:70%;display:flex;flex-direction:column;font-size:14px;opacity:0;transform:translateY(10px);animation:fadeIn 0.3s forwards;}
.me{align-self:flex-end;background:#2563eb;}
.other{align-self:flex-start;background:#1f2937;}
.author{font-size:11px;opacity:0.7;margin-bottom:2px;}
.timestamp{font-size:10px;opacity:0.5;margin-top:4px;text-align:right;}

#inputArea{flex-shrink:0;display:flex;padding:10px;gap:10px;border-top:1px solid #1f2937;}
#msg{flex:1;padding:12px;border-radius:8px;border:none;background:#1f2937;color:white;transition:0.2s;}
#msg:focus{outline:none;box-shadow:0 0 8px #2563eb;}
#sendBtn{padding:12px 16px;border:none;border-radius:8px;background:#2563eb;color:white;cursor:pointer;transition:0.2s;}
#sendBtn:disabled{background:#374151;cursor:not-allowed;}
#sendBtn:hover:not(:disabled){background:#1e40af;}

#overlay{
  display:none;
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:#0b0f19;
  color:white;
  display:flex; justify-content:center; align-items:center;
  font-size:24px; text-align:center; padding:20px;
  z-index:999;
  animation:fadeIn 0.5s forwards;
}

@keyframes fadeIn { to {opacity:1; transform:translateY(0);} }
</style>
</head>
<body>

<div id="login">
<h2>Atun</h2>
<input id="dummy" placeholder="Ingresa tu dato curioso">
<input id="nick" placeholder="Nick">
<input id="room" type="password" placeholder="Palabra aleatoria">
<button id="loginBtn">Ingresar</button>
</div>

<div id="chat">
<div id="header">
<div>
<b>Atun</b>
<div id="roomHash"></div>
<div id="status">Iniciando servidor...</div>
</div>
<button id="deleteBtn">Borrar</button>
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="Escribe tu mensaje y presiona Enter" enterkeyhint="send">
<button id="sendBtn" disabled>Enviar</button>
</div>
</div>

<div id="overlay"></div>

<script src="https://cccahahhthh.onrender.com/socket.io/socket.io.js"></script>
<script>
// -------------------- ESTADO --------------------
let seenMessages = new Set();
let socket;
let room="", nick="";
let coldTimer;

// -------------------- DATOS CURIOSOS --------------------
const motivationMessages = [
  "El corazón humano genera suficiente presión para expulsar sangre a 9 metros de distancia.",
  "Los pulpos tienen tres corazones y su sangre es azul.",
  "El Sol representa más del 99% de la masa de nuestro sistema solar.",
  "Los flamencos nacen grises y se vuelven rosados por su alimentación.",
  "La miel nunca se echa a perder; se han encontrado tarros de miles de años intactos.",
  "Un día en Venus dura más que un año en Venus.",
  "Los tiburones existen desde antes que los árboles.",
  "El ADN humano y el del plátano comparten aproximadamente un 50% de similitud.",
  "El cerebro humano puede generar aproximadamente 20 vatios de potencia eléctrica.",
  "Existen más estrellas en el universo observable que granos de arena en todas las playas de la Tierra.",
  "Las medusas existen desde hace más de 500 millones de años, antes que los dinosaurios.",
  "El agua caliente se congela más rápido que el agua fría bajo ciertas condiciones, fenómeno llamado efecto Mpemba.",
  "Los gatos no pueden percibir sabores dulces.",
  "Las abejas pueden reconocer rostros humanos.",
  "Las vacas tienen mejores amigas y se estresan si se separan de ellas.",
  "Un solo rayo contiene suficiente energía para cocinar 100,000 rebanadas de pan.",
  "Los murciélagos siempre giran a la izquierda al salir de una cueva.",
  "El diamante más grande jamás encontrado pesaba más de 3,100 quilates.",
  "Los cocodrilos no pueden sacar la lengua.",
  "Los escorpiones brillan bajo luz ultravioleta.",
  "La luna se aleja de la Tierra aproximadamente 3.8 cm por año.",
  "Los pulpos pueden usar herramientas y abrir frascos para obtener comida.",
  "Los elefantes son los únicos animales que no pueden saltar.",
  "Las jirafas tienen la misma cantidad de vértebras en el cuello que los humanos: 7.",
  "El corazón de una ballena azul es tan grande que un humano podría nadar por sus arterias.",
  "El primer producto con código de barras escaneado fue un chicle Wrigley's en 1974.",
  "Las hormigas no duermen y algunas especies pueden cargar hasta 50 veces su peso.",
  "El cerebro humano tiene más conexiones que estrellas hay en la Vía Láctea.",
  "El Monte Everest crece aproximadamente 4 mm cada año debido al movimiento de las placas tectónicas.",
  "Los tiburones duermen con un ojo abierto y otro cerrado."
];

// -------------------- ELEMENTOS --------------------
const loginEl = document.getElementById("login");
const chatEl = document.getElementById("chat");
const overlay = document.getElementById("overlay");
const msgInput = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");

// -------------------- UTIL --------------------
function isMobile(){
  return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
}

// -------------------- FUNCIONES --------------------
function escapeHtml(text){ return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function addMessage(author,text,time){
  const el=document.createElement("div");
  el.className="message "+(author===nick?"me":"other");
  const t=new Date(time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  el.innerHTML="<div class='author'>"+author+"</div><div>"+escapeHtml(text)+"</div><div class='timestamp'>"+t+"</div>";
  document.getElementById("messages").appendChild(el);
  el.scrollIntoView({behavior:"smooth"});
}
function systemMsg(text){
  const el=document.createElement("div");
  el.style.fontSize="12px"; el.style.opacity="0.6"; el.style.textAlign="center";
  el.style.animation="fadeIn 0.3s forwards";
  el.innerText=text;
  document.getElementById("messages").appendChild(el);
  el.scrollIntoView({behavior:"smooth"});
}
function saveLocalMessage(msg){
  const key="chat_"+room;
  let history=JSON.parse(localStorage.getItem(key)||"[]");
  history.push(msg);
  if(history.length>100) history.shift();
  localStorage.setItem(key,JSON.stringify(history));
}

// -------------------- HASH --------------------
async function hashRoom(password){
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest("SHA-256", enc.encode(password));
  return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,"0")).join("");
}

// -------------------- LOGIN --------------------
document.getElementById("loginBtn").addEventListener("click", async () => { await join(); });

async function join(){
  nick = document.getElementById("nick").value.trim();
  const pass = document.getElementById("room").value.trim();
  if(!nick) return;

  // Contraseña solo 3 cifras numéricas
  const blockedPasswords = ["123", "000", "111", "999", "321", "666"];

	if(!/^\d{3}$/.test(pass) || blockedPasswords.includes(pass)){
		alert("Palabra invalida");
		return;
	}

  localStorage.setItem("nick", nick);

  room = await hashRoom(pass);
  document.getElementById("roomHash").innerText = "Sala: "+room.slice(0,16);

  // Overlay solo para PC/Tablet
  const overlayActive = !isMobile() && localStorage.getItem("chatHidden")==="true";

  loginEl.style.display="none";
  if(overlayActive){ overlay.style.display="flex"; chatEl.style.display="none"; }
  else{ chatEl.style.display="flex"; }

  document.getElementById("status").innerText="Iniciando servidor...";

  socket = io("https://cccahahhthh.onrender.com");
  coldTimer = setTimeout(()=>{ document.getElementById("status").innerText="Intentando conectar..."; },2000);

  socket.emit("join-room",{room,nick});

  socket.on("connect", ()=>{ clearTimeout(coldTimer); });
  socket.on("disconnect", ()=>{ document.getElementById("status").innerText="Desconectado"; });

  socket.on("history", (messages)=>{
    document.getElementById("messages").innerHTML="";
    messages.forEach(m=>{
      if(seenMessages.has(m.id)) return;
      seenMessages.add(m.id);
      addMessage(m.nick,m.text,m.time);
    });
  });

  socket.on("message", (msg)=>{
    if(seenMessages.has(msg.id)) return;
    seenMessages.add(msg.id);
    saveLocalMessage(msg);
    addMessage(msg.nick,msg.text,msg.time);
  });

  socket.on("user-joined", (n)=>{ if(n !== nick){ systemMsg(n+" se unió."); } });
  socket.on("user-left", (n)=>{ systemMsg(n+" se fue."); });

  socket.on("update-users", (users)=>{
    const statusEl = document.getElementById("status");
    statusEl.innerText = users.length===0 ? "Conectado (sin usuarios)" : "Conectado: "+users.join(", ");
  });

  socket.on("chat-deleted", ()=>{
    document.getElementById("messages").innerHTML="";
    localStorage.removeItem("chat_"+room);
  });
}

// -------------------- ENVIAR --------------------
msgInput.addEventListener("input", ()=>{ sendBtn.disabled = !msgInput.value.trim(); });
sendBtn.addEventListener("click", send);
msgInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); send(); } });

function send(){
  const text = msgInput.value.trim();
  if(!text || text.length>500) return;
  const msg = {id:Date.now()+"_"+Math.random(), room, nick, text, time:new Date().toISOString()};
  socket.emit("message", msg);
  msgInput.value = "";
  sendBtn.disabled = true;
}

// -------------------- BORRAR CHAT --------------------
document.getElementById("deleteBtn").addEventListener("click", ()=>{
  const code=prompt("Delete code");
  if(!code) return;
  socket.emit("delete-chat",{room,code});
});

// -------------------- OVERLAY --------------------
function showOverlay(){
  if(isMobile()) return;
  overlay.style.display="flex";
  overlay.innerText = motivationMessages[Math.floor(Math.random()*motivationMessages.length)];
  localStorage.setItem("chatHidden","true");
}
function hideOverlay(){
  overlay.style.display="none";
  const savedNick = localStorage.getItem("nick");
  if(savedNick){ chatEl.style.display="flex"; loginEl.style.display="none"; }
  else{ loginEl.style.display="block"; chatEl.style.display="none"; }
  localStorage.setItem("chatHidden","false");
}

// -------------------- TECLAS --------------------
window.addEventListener("keydown", (e)=>{
  if(e.ctrlKey && e.key.toLowerCase() === "q"){
    if(isMobile()) return;
    if(chatEl.style.display !== "flex") return; // Ctrl+Q solo si chat está activo
    if(overlay.style.display === "flex"){ hideOverlay(); }
    else{ showOverlay(); }
  }
});

// -------------------- INICIALIZAR PAGINA --------------------
window.addEventListener("load", ()=>{
  const savedNick = localStorage.getItem("nick");
  if(savedNick) document.getElementById("nick").value = savedNick;

  // Al cargar siempre mostrar login, sin importar overlay previo
  loginEl.style.display="block";
  chatEl.style.display="none";
  overlay.style.display="none";
});


let inactivityTimer;
function resetInactivityTimer(){
  clearTimeout(inactivityTimer);
  if(isMobile()) return; // no aplicar en móvil
  inactivityTimer = setTimeout(()=>{
    if(chatEl.style.display === "flex" && overlay.style.display !== "flex"){
      showOverlay();
    }
  }, 50000);
}

// Escuchar interacciones del usuario
["mousemove","keydown","mousedown","touchstart"].forEach(evt=>{
  window.addEventListener(evt, resetInactivityTimer);
});

// Iniciar timer al cargar página y al ingresar al chat
window.addEventListener("load", resetInactivityTimer);
msgInput.addEventListener("focus", resetInactivityTimer);

</script>
</body>
</html>
