<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atun con chat</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui,Segoe UI,Roboto;
}

body{
background:#0b0f19;
color:white;
height:100dvh;
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN */

#login{
width:100%;
max-width:420px;
background:#121826;
padding:40px;
border-radius:14px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

#login h2{
text-align:center;
margin-bottom:20px;
font-weight:600;
}

#login input{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:8px;
background:#0b0f19;
color:white;
}

#login button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

/* CHAT */

#chat{
display:none;
flex-direction:column;
width:100%;
max-width:750px;
height:100dvh;
background:#0b0f19;
}

/* HEADER */

#header{
flex-shrink:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
border-bottom:1px solid #1f2937;
}

#status{
font-size:12px;
opacity:0.6;
}

#deleteBtn{
background:#ef4444;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

/* MESSAGES */

#messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
padding:10px 14px;
border-radius:10px;
max-width:70%;
display:flex;
flex-direction:column;
font-size:14px;
}

.me{
align-self:flex-end;
background:#2563eb;
}

.other{
align-self:flex-start;
background:#1f2937;
}

.author{
font-size:11px;
opacity:0.7;
}

.timestamp{
font-size:10px;
opacity:0.5;
margin-top:4px;
}

/* INPUT */

#inputArea{
flex-shrink:0;
display:flex;
padding:10px;
gap:10px;
border-top:1px solid #1f2937;
background:#0b0f19;
}

#msg{
flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#1f2937;
color:white;
}

#sendBtn{
padding:12px 16px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

/* MOBILE FIX */

@media (max-width:600px){

#messages{
padding:14px;
}

.message{
max-width:85%;
}

}

</style>

</head>

<body>

<div id="login">

<h2>Atun con chat</h2>

<input id="nick" placeholder="Nickname">
<input id="room" type="password" placeholder="Room Password">

<button onclick="join()">Enter</button>

</div>

<div id="chat">

<div id="header">

<div>
<b>Atun con chat</b>
<div id="status">Connecting...</div>
</div>

<button id="deleteBtn" onclick="deleteChat()">Delete</button>

</div>

<div id="messages"></div>

<div id="inputArea">

<input id="msg" placeholder="Type message" enterkeyhint="send">
<button id="sendBtn" onclick="send()">Send</button>

</div>

</div>

<script src="https://cccahahhthh.onrender.com/socket.io/socket.io.js"></script>

<script>

const socket = io("https://cccahahhthh.onrender.com")

let room=""
let nick=""

/* HASH */

async function hashRoom(password){

const enc=new TextEncoder()
const buf=await crypto.subtle.digest("SHA-256",enc.encode(password))

return [...new Uint8Array(buf)]
.map(x=>x.toString(16).padStart(2,"0"))
.join("")

}

/* JOIN */

async function join(){

nick=document.getElementById("nick").value.trim()
const pass=document.getElementById("room").value.trim()

if(!nick||!pass)return

room=await hashRoom(pass)

socket.emit("join-room",{room,nick})

document.getElementById("login").style.display="none"
document.getElementById("chat").style.display="flex"

}

/* HISTORIAL */

socket.on("history",(messages)=>{

messages.forEach(m=>addMessage(m.nick,m.text,m.time))

scrollDown()

})

/* MENSAJE */

socket.on("message",(msg)=>{

addMessage(msg.nick,msg.text,msg.time)

scrollDown()

})

/* DELETE */

socket.on("chat-deleted",()=>{

document.getElementById("messages").innerHTML=""

})

/* USER CONNECT */

socket.on("user-joined",(n)=>{

systemMsg(n+" joined")

})

socket.on("user-left",(n)=>{

systemMsg(n+" left")

})

/* SEND */

function send(){

const input=document.getElementById("msg")
const text=input.value.trim()

if(!text)return

socket.emit("message",{
room,
nick,
text,
time:new Date().toISOString()
})

input.value=""

}

/* ENTER */

document.getElementById("msg").addEventListener("keydown",(e)=>{

if(e.key==="Enter"){
e.preventDefault()
send()
}

})

/* MESSAGE RENDER */

function addMessage(author,text,time){

const el=document.createElement("div")

el.className="message "+(author===nick?"me":"other")

const t=new Date(time).toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

el.innerHTML=

"<div class='author'>"+author+"</div>"+
"<div>"+text+"</div>"+
"<div class='timestamp'>"+t+"</div>"

document.getElementById("messages").appendChild(el)

}

/* SYSTEM MSG */

function systemMsg(text){

const el=document.createElement("div")

el.style.fontSize="12px"
el.style.opacity="0.6"
el.style.textAlign="center"

el.innerText=text

document.getElementById("messages").appendChild(el)

}

/* SCROLL */

function scrollDown(){

const box=document.getElementById("messages")
box.scrollTop=box.scrollHeight

}

/* DELETE */

function deleteChat(){

const code=prompt("Delete code")

if(!code)return

socket.emit("delete-chat",{room,code})

}

</script>

</body>
</html>
