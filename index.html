<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atun con chat</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui,Segoe UI,Roboto,Arial;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN */

#login{
width:100%;
max-width:420px;
padding:40px;
background:#1e293b;
border-radius:14px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
text-align:center;
}

#login h2{
margin-bottom:20px;
}

#login input{
width:100%;
padding:14px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
margin-bottom:12px;
font-size:15px;
}

#login button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* CHAT */

#chat{
display:none;
flex-direction:column;
height:100vh;
width:100%;
max-width:750px;
background:#020617;
}

#header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 16px;
border-bottom:1px solid #1e293b;
}

#deleteBtn{
background:#ef4444;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
padding:10px 14px;
border-radius:10px;
max-width:70%;
font-size:15px;
display:flex;
flex-direction:column;
}

.me{
background:#2563eb;
align-self:flex-end;
}

.other{
background:#1e293b;
align-self:flex-start;
}

.author{
font-size:12px;
opacity:0.7;
margin-bottom:2px;
}

.timestamp{
font-size:11px;
opacity:0.5;
margin-top:4px;
}

/* INPUT AREA */

#inputArea{
display:flex;
padding:12px;
border-top:1px solid #1e293b;
}

#msg{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
}

#sendBtn{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* MOBILE */

@media (max-width:600px){

.message{
max-width:85%;
}

#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
}

}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">

<h2>Atun con chat</h2>

<input id="nick" placeholder="Nickname">

<input id="room" type="password" placeholder="Room Password">

<button onclick="join()">Enter</button>

</div>

<!-- CHAT -->

<div id="chat">

<div id="header">

<span>Atun con chat</span>

<button id="deleteBtn" onclick="deleteChat()">Delete</button>

</div>

<div id="messages"></div>

<div id="inputArea">

<input id="msg" placeholder="Type message" enterkeyhint="send">

<button id="sendBtn" onclick="send()">Send</button>

</div>

</div>

<script src="https://cccahahhthh.onrender.com/socket.io/socket.io.js"></script>

<script>

const socket = io("https://cccahahhthh.onrender.com")

let room=""
let nick=""

/* HASH SALA */

async function hashRoom(password){

const encoder = new TextEncoder()
const data = encoder.encode(password)

const hashBuffer = await crypto.subtle.digest("SHA-256",data)

const hashArray = Array.from(new Uint8Array(hashBuffer))

return hashArray.map(b=>b.toString(16).padStart(2,"0")).join("")

}

/* JOIN ROOM */

async function join(){

const password=document.getElementById("room").value.trim()
nick=document.getElementById("nick").value.trim()

if(!password || !nick) return

room = await hashRoom(password)

socket.emit("join-room",room)

document.getElementById("login").style.display="none"
document.getElementById("chat").style.display="flex"

}

/* HISTORIAL */

socket.on("history",(messages)=>{

messages.forEach(m=>{
addMessage(m.nick,m.text,m.time)
})

scrollDown()

})

/* MENSAJE NUEVO */

socket.on("message",(msg)=>{

addMessage(msg.nick,msg.text,msg.time)

scrollDown()

})

/* CHAT BORRADO */

socket.on("chat-deleted",()=>{

document.getElementById("messages").innerHTML=""

})

/* ENVIAR */

function send(){

const input=document.getElementById("msg")
const text=input.value.trim()

if(!text) return

const msg = {

room:room,
nick:nick,
text:text,
time:new Date().toISOString()

}

socket.emit("message",msg)

input.value=""

}

/* ENTER ENVIA MENSAJE */

document.getElementById("msg").addEventListener("keydown",function(e){

if(e.key === "Enter"){

e.preventDefault()
send()

}

})

/* MOSTRAR MENSAJE */

function addMessage(author,text,time){

const container=document.createElement("div")

container.className="message "+(author===nick?"me":"other")

const date = new Date(time)

const t = date.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

container.innerHTML=

"<div class='author'>"+author+"</div>"+
"<div>"+text+"</div>"+
"<div class='timestamp'>"+t+"</div>"

document.getElementById("messages").appendChild(container)

}

/* SCROLL */

function scrollDown(){

const chat=document.getElementById("messages")
chat.scrollTop=chat.scrollHeight

}

/* BORRAR CHAT */

function deleteChat(){

const code = prompt("Delete code")

if(!code) return

socket.emit("delete-chat",{
room:room,
code:code
})

}

</script>

</body>
</html>
